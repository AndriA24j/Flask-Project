<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/admin.css') }}"
    />
  </head>

  <body>
    <!-- SIDEBAR (unchanged, just FIX links) -->
    <aside class="sidebar">
      <a href="{{ url_for('admin_products') }}" class="sidebar-logo">
        audiophile
      </a>

      <div class="sidebar-section">
        <p class="sidebar-section-label">Overview</p>

        <a href="{{ url_for('admin_products') }}" class="nav-item active">
          Products
        </a>
      </div>

      <div class="sidebar-footer">
        <a class="btn-logout" href="{{ url_for('admin_logout') }}">
          Sign out
        </a>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <header class="topbar">
        <h1>Products</h1>
      </header>

      <div class="content">
        <!-- ADD BUTTON -->
        <a class="btn-add" href="{{ url_for('create_product') }}">
          Add product
        </a>

        <!-- TABLE -->
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Slug</th>
                <th>Price</th>
                <th>Actions</th>
              </tr>
            </thead>

            <tbody>
              {% for p in products %}
              <tr>
                <td>{{ p.name }}</td>
                <td>{{ p.slug }}</td>
                <td>${{ p.price }}</td>

                <td>
                  <a
                    href="{{ url_for('delete_product', id=p.id) }}"
                    onclick="return confirm('Delete product?');"
                  >
                    Delete
                  </a>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
